# T7.2. Scrapes both processes' /metrics endpoints. Referenced by
# docker-compose.observability.yml; when run outside that compose
# network, replace `api`/`worker` with the real hostnames.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: payment-orchestrator-api
    static_configs:
      - targets: ['api:3000']
        labels:
          service: payment-orchestrator
          process: api

  - job_name: payment-orchestrator-worker
    static_configs:
      - targets: ['worker:9464']
        labels:
          service: payment-orchestrator
          process: worker
